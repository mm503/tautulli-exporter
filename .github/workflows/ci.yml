name: CI

on:
  push:
    branches-ignore: ["main"]

env:
  REGISTRY: docker.io
  IMAGE_NAME: mm404/tautulli-exporter

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: |
          helm lint charts/tautulli-exporter \
            --set config.tautulliUrl=http://tautulli:8181 \
            --set config.apiKey=ci-dummy-key-0000

      - name: Template chart
        run: |
          helm template tautulli-exporter charts/tautulli-exporter \
            --set config.tautulliUrl=http://tautulli:8181 \
            --set config.apiKey=ci-dummy-key-0000 \
            --set serviceMonitor.enabled=true > /dev/null

  build:
    runs-on: ubuntu-latest
    needs: helm-validate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version-file: go.mod

    - name: Vet
      run: go vet ./...

    - name: Run tests
      run: go test ./... -cover

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: mm404
        password: ${{ secrets.DOCKER_HUB_KEY }}

    - name: Get current release version
      id: version
      run: echo "version=$(jq -r '.["."]' .release-please-manifest.json)" >> $GITHUB_OUTPUT

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=dev-${{ steps.version.outputs.version }}-{{branch}}-{{sha}},enable=${{ github.ref_type == 'branch' }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
