name: Release Please

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: mm404/tautulli-exporter

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: |
          helm lint charts/tautulli-exporter \
            --set config.tautulliUrl=http://tautulli:8181 \
            --set config.apiKey=ci-dummy-key-0000

      - name: Template chart
        run: |
          helm template tautulli-exporter charts/tautulli-exporter \
            --set config.tautulliUrl=http://tautulli:8181 \
            --set config.apiKey=ci-dummy-key-0000 \
            --set serviceMonitor.enabled=true > /dev/null

  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -cover

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-please:
    runs-on: ubuntu-latest
    needs: [build-check, helm-validate]
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker-release:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Strip v prefix from tag
        id: version
        run: echo "version=$(echo '${{ needs.release-please.outputs.tag_name }}' | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: mm404
          password: ${{ secrets.DOCKER_HUB_KEY }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-chart:
    runs-on: ubuntu-latest
    needs: [release-please, docker-release]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Update chart appVersion
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" charts/tautulli-exporter/Chart.yaml

      - name: Bump chart version
        run: |
          CHART_VERSION=$(grep '^version:' charts/tautulli-exporter/Chart.yaml | awk '{print $2}')
          NEW_CHART_VERSION=$(echo "$CHART_VERSION" | awk -F. '{$NF = $NF + 1; print}' OFS='.')
          sed -i "s/^version: .*/version: ${NEW_CHART_VERSION}/" charts/tautulli-exporter/Chart.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/tautulli-exporter/Chart.yaml
          git commit -m "chore(chart): update to app version ${{ needs.release-please.outputs.tag_name }}"
          git push

  helm-release:
    runs-on: ubuntu-latest
    needs: update-chart
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
